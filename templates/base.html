<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FitGuard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  {% if session.user_id %}
  <nav class="navbar">
    <a href="{{ url_for('dashboard') }}" class="nav-brand">
      <span class="brand-icon">⚡</span>FitGuard
    </a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{{ url_for('log_workout') }}" class="nav-link {% if request.endpoint == 'log_workout' %}active{% endif %}">Log Workout</a>
      <a href="{{ url_for('workouts') }}" class="nav-link {% if request.endpoint == 'workouts' %}active{% endif %}">History</a>
      <a href="{{ url_for('challenges') }}" class="nav-link {% if request.endpoint == 'challenges' %}active{% endif %}">Challenges</a>
      <a href="{{ url_for('logout') }}" class="nav-link logout">Logout</a>
    </div>
  </nav>
  {% endif %}

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for cat, msg in messages %}
          <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
